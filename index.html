 <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jhoREBA MARKET</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
  }
  header {
    background: #f97316;
    padding: 14px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }
  .filter {
    display: flex;
    gap: 8px;
    padding: 12px;
    overflow-x: auto;
  }
  .filter button {
    padding: 8px 18px;
    border: none;
    border-radius: 20px;
    background: #334155;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .filter button.active {
    background: #f97316;
  }
  .list {
    padding: 0 12px 20px;
  }
  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
    display: flex;
    gap: 12px;
  }
  .card img {
    width: 70px;
    height: 70px;
    border-radius: 8px;
    background: #334155;
    object-fit: cover;
  }
  .card-content {
    flex: 1;
  }
  .card h3 {
    font-size: 16px;
    margin-bottom: 4px;
    color: #fff;
  }
  .card .sub {
    font-size: 13px;
    color: #fb923c;
    margin-bottom: 6px;
  }
  .card .price {
    font-size: 18px;
    color: #22c55e;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .card .desc {
    font-size: 13px;
    color: #cbd5e1;
    margin-bottom: 10px;
  }
  .btn-wa {
    display: inline-block;
    padding: 8px 20px;
    background: #22c55e;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    font-weight: bold;
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>🎮 jhoREBA MARKET</header>

<div class="filter">
  <button class="active" onclick="filterAkun('all')">All</button>
  <button onclick="filterAkun('ml')">ML</button>
  <button onclick="filterAkun('pubg')">PUBG</button>
  <button onclick="filterAkun('ff')">FF</button>
  <button onclick="filterAkun('genshin')">Genshin</button>
</div>

<div class="list">
  
  <div class="card" data-kategori="ml">
    <img src="https://via.placeholder.com/140x140.png?text=ML" alt="">
    <div class="card-content">
      <h3>Akun MMR 3500 Skin Legend</h3>
      <p class="sub">Mobile Legend • Raka</p>
      <p class="price">Rp 250.000</p>
      <p class="desc">Wanwan, Fanny, Gusion lengkap. Winrate 62%</p>
      <a class="btn-wa" href="https://wa.me/6281234567890?text=Halo mau beli Akun MMR 3500 Skin Legend">Chat WA</a>
    </div>
  </div>

  <div class="card" data-kategori="ff">
    <img src="https://via.placeholder.com/140x140.png?text=FF" alt="">
    <div class="card-content">
      <h3>Akun SG 2 Emote Lengkap</h3>
      <p class="sub">Free Fire • Dimas</p>
      <p class="price">Rp 120.000</p>
      <p class="desc">Heroic 2x, Bundle lama banyak</p>
      <a class="btn-wa" href="https://wa.me/6281234567890?text=Halo mau beli Akun SG 2 Emote Lengkap">Chat WA</a>
    </div>
  </div>

</div>

<script>
function filterAkun(kategori) {
  document.querySelectorAll('.filter button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  document.querySelectorAll('.card').forEach(card => {
    if (kategori === 'all' || card.getAttribute('data-kategori') === kategori) {
      card.style.display = 'flex';
    } else {
      card.style.display = 'none';
    }
  });
}
</script>

</body>
</html>
