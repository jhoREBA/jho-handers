<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jhoREBA MARKET</title>
<style>
  body { margin:0; font-family:Arial,sans-serif; background:#0f172a; color:#fff; padding-bottom:70px; }
  header { background:#f97316; padding:14px; text-align:center; font-size:20px; font-weight:bold; }
  .filter { display:flex; gap:8px; padding:12px; overflow-x:auto; }
  .filter button { padding:8px 18px; border:none; border-radius:20px; background:#334155; color:#fff; font-size:14px; cursor:pointer; }
  .filter button.active { background:#f97316; }
  .list { padding:0 12px 20px; }
  .card { background:#1e293b; border-radius:12px; padding:12px; margin-bottom:12px; display:none; }
  .card.show { display:block; }
  .card h3 { font-size:16px; margin:0 0 4px 0; }
  .card .sub { font-size:13px; color:#fb923c; margin-bottom:6px; }
  .card .price { font-size:18px; color:#22c55e; font-weight:bold; margin-bottom:8px; }
  .card .desc { font-size:13px; color:#cbd5e1; margin-bottom:10px; }
  .btn-wa { display:inline-block; padding:8px 20px; background:#22c55e; color:#fff; border-radius:20px; text-decoration:none; font-size:14px; font-weight:bold; }
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:#fff; display:flex; justify-content:space-around; padding:10px 0; border-top:1px solid #e2e8f0; }
  .bottom-nav button { background:none; border:none; font-size:13px; color:#64748b; cursor:pointer; }
  .bottom-nav button.active { color:#f97316; font-weight:bold; }
  .page { display:none; }
  .page.active { display:block; }
  input, select, textarea { width:100%; padding:10px; margin:8px 0; border-radius:8px; border:none; background:#334155; color:#fff; }
  label { font-size:14px; color:#cbd5e1; }
  .btn-submit { width:100%; padding:12px; background:#f97316; border:none; border-radius:8px; color:#fff; font-weight:bold; font-size:16px; cursor:pointer; }
</style>
</head>
<body>

<header>🎮 jhoREBA MARKET</header>

<div id="beliPage" class="page active">
  <div class="filter">
    <button class="active" onclick="filterGame('all')">All</button>
    <button onclick="filterGame('ml')">ML</button>
    <button onclick="filterGame('pubg')">PUBG</button>
    <button onclick="filterGame('ff')">FF</button>
  </div>
  <div class="list" id="listingContainer"></div>
</div>

<div id="jualPage" class="page">
  <div style="padding:20px;">
    <h2>Jual Akun Game</h2>
    <form onsubmit="daftarSeller(event)">
      <label>Nama Penjual</label>
      <input type="text" id="nama" required>
      
      <label>No WhatsApp</label>
      <input type="tel" id="wa" placeholder="6281234567890" required>
      
      <label>Email</label>
      <input type="email" id="email" required>
      
      <label>Game</label>
      <select id="game" required>
        <option value="ml">Mobile Legend</option>
        <option value="pubg">PUBG Mobile</option>
        <option value="ff">Free Fire</option>
      </select>
      
      <label>Judul Akun</label>
      <input type="text" id="judul" required>
      
      <label>Harga</label>
      <input type="text" id="harga" placeholder="Rp 250.000" required>
      
      <label>Deskripsi</label>
      <textarea id="desc" rows="3" required></textarea>
      
      <button type="submit" class="btn-submit">Daftar & Posting Akun</button>
    </form>
  </div>
</div>

<div id="daftarPage" class="page">
  <div style="padding:20px; text-align:center;">
    <h2>Daftar Seller</h2>
    <p>Silakan buka menu "Jual" untuk mendaftarkan akun game lo</p>
  </div>
</div>

<div id="infoPage" class="page">
  <div style="padding:20px; text-align:center;">
    <h2>Info</h2>
    <p>jhoREBA MARKET - Platform jual beli akun game antar user</p>
    <p>Tiap seller punya WA sendiri, pembeli langsung chat ke penjual</p>
  </div>
</div>

<div class="bottom-nav">
  <button class="active" onclick="switchPage('beli')">Beli</button>
  <button onclick="switchPage('jual')">Jual</button>
  <button onclick="switchPage('daftar')">Daftar</button>
  <button onclick="switchPage('info')">Info</button>
</div>

<script>
let listings = JSON.parse(localStorage.getItem('listings')) || [];

function renderListings() {
  const container = document.getElementById('listingContainer');
  container.innerHTML = '';
  listings.forEach(item => {
    container.innerHTML += `
      <div class="card show" data-game="${item.game}">
        <h3>${item.judul}</h3>
        <p class="sub">${item.game.toUpperCase()} • ${item.nama}</p>
        <p class="price">${item.harga}</p>
        <p class="desc">${item.desc}</p>
        <a class="btn-wa" href="https://wa.me/${item.wa}?text=Halo%20${item.nama},%20mau%20tanya%20akun%20${item.judul}">Chat WA</a>
      </div>
    `;
  });
}

function daftarSeller(e) {
  e.preventDefault();
  const data = {
    nama: document.getElementById('nama').value,
    wa: document.getElementById('wa').value.replace('+','').replace('0','62'),
    email: document.getElementById('email').value,
    game: document.getElementById('game').value,
    judul: document.getElementById('judul').value,
    harga: document.getElementById('harga').value,
    desc: document.getElementById('desc').value
  };
  listings.push(data);
  localStorage.setItem('listings', JSON.stringify(listings));
  alert('Akun berhasil diposting!');
  e.target.reset();
  switchPage('beli');
  renderListings();
}

function filterGame(game) {
  document.querySelectorAll('.filter button').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.card').forEach(card => {
    if(game === 'all' || card.dataset.game === game) {
      card.classList.add('show');
    } else {
      card.classList.remove('show');
    }
  });
}

function switchPage(page) {
  document.querySelectorAll('.bottom-nav button').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page + 'Page').classList.add('active');
}

renderListings();
</script>

</body>
</html>
