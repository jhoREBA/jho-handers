<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Block Puzzle Santai</title>
<style>
  body{
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:'Arial', sans-serif;
    color:white;
    user-select:none;
  }
  #game{
    text-align:center;
  }
  #board{
    display:grid;
    grid-template-columns: repeat(8, 40px);
    grid-template-rows: repeat(8, 40px);
    gap:2px;
    background:#111;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
  }
 .cell{
    width:40px;
    height:40px;
    background:#333;
    border-radius:4px;
  }
 .filled{background:#00ff88; box-shadow:0 0 8px #00ff88;}
 .block{
    display:inline-block;
    margin:10px;
    cursor:grab;
  }
 .block-piece{
    width:20px; height:20px; background:#ffaa00;
    display:inline-block; margin:1px; border-radius:3px;
  }
  #score{
    font-size:24px; margin-bottom:10px;
  }
  #blocks{
    margin-top:15px;
  }
</style>
</head>
<body>
<div id="game">
  <div id="score">Score: 0</div>
  <div id="board"></div>
  <div id="blocks"></div>
  <button onclick="restart()" style="margin-top:15px;padding:10px 20px;background:#00ff88;border:none;border-radius:5px;color:#000;font-weight:bold;">Restart</button>
</div>

<script>

// 8x8 board
function initBoard(){
  board = Array(8).fill().map(()=>Array(8).fill(0));
  boardEl.innerHTML = '';
  for(let i=0;i<8;i++){
    for(let j=0;j<8;j++){
      let cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${i}-${j}`;
      boardEl.appendChild(cell);
    }
  }
}

  [[1,0],[1,1]] // L kebalik
