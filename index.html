<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lapak Akun Game Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--card:#111827;--accent:#3b82f6;--green:#22c55e}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:var(--bg);color:#e5e7eb}
header{background:var(--card);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0}
header h1{color:var(--accent);font-size:20px}
.container{max-width:1300px;margin:20px auto;padding:10px}
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.toolbar input, .toolbar select{padding:12px;border-radius:8px;border:1px solid #374151;background:var(--card);color:#fff;flex:1}
.btn{background:var(--accent);color:#fff;padding:12px 18px;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.btn-green{background:var(--green)}
.btn-red{background:#ef4444}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.card{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid #374151}
.card img{width:100%;height:220px;object-fit:cover}
.card-body{padding:15px}
.card-body .top{display:flex;justify-content:space-between;align-items:center}
