<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Jho Passion Market</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#0a0a0f;color:#fff;font-family:Arial,sans-serif;padding-bottom:75px;min-height:100vh}

/* HEADER JHO PASSION */
.head{
height:180px;
background:linear-gradient(135deg,#1a0a00 0%,#2d1a0a 50%,#ff6600 100%);
border-bottom:3px solid #ff6600;
display:flex;flex-direction:column;justify-content:center;align-items:center;
text-align:center;position:relative;overflow:hidden
}
.head::before{
content:"🎮";position:absolute;font-size:120px;opacity:0.08;top:-20px;left:20px;transform:rotate(-15deg)
}
.head h1{margin:0;font-size:32px;font-weight:900;z-index:2}
.head h1 span{color:#ff6600}
.head p{margin:6px 0 0;font-size:13px;color:#ffa500;font-weight:bold;letter-spacing:1px;z-index:2}

.box{padding:15px 15px 80px 15px}
.card{background:#1a1a2e;border:1px solid #2d2d44;border-radius:12px;padding:14px;margin-bottom:12px}
.card h3{margin:0 0 6px;color:#ff8800;font-size:16px}
.card p{margin:6px 0;color:#cbd5e1;font-size:14px}
.btn{background:#25D366;color:#fff;border:none;padding:10px;border-radius:8px;width:100%;margin-top:8px;font-weight:bold;font-size:14px}

.page{display:none}
.page.show{display:block}

/* MENU BAWAH FIX - PASTI MUNCUL */
.nav{
position:fixed;bottom:0;left:0;width:100%;height:65px;
background:#0f0f1a;display:flex;border-top:3px solid #ff6600;
z-index:999;box-shadow:0 -4px 15px rgba(0,0,0,0.8)
}
.nav button{
flex:1;background:none;border:none;color:#666;padding:8px 5px;
font-size:11px;cursor:pointer;display:flex;flex-direction:column;
align-items:center;justify-content:center;transition:0.2s
}
.nav button.active{color:#ff8800;font-weight:bold;background:rgba(255,136,0,0.12)}
.nav-icon{font-size:22px;margin-bottom:3px;line-height:1}

#jualBtn{
position:fixed;right:15px;bottom:80px;width:55px;height:55px;
border-radius:50%;background:#ff6600;color:#fff;border:none;
font-size:28px;z-index:998;box-shadow:0 4px 15px rgba(255,102,0,0.5)
}

/* POPUP JUAL */
#popupJual{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;justify-content:center;align-items:center}
#popupJual.show{display:flex}
.popupBox{background:#1a1a2e;border:2px solid #ff6600;border-radius:15px;padding:20px;width:88%;max-width:340px}
.popupBox h3{margin:0 0 15px;color:#ff8800;text-align:center;font-size:18px}
.popupBox input,.popupBox textarea{width:100%;padding:10px;margin-bottom:10px;background:#0f0f
