<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JhoReba</title>
<style>
body{margin:0;background:#0a0a0f;color:#fff;font-family:Arial,sans-serif;padding-bottom:65px}

.head{position:relative;height:220px;overflow:hidden;border-bottom:3px solid #7c3aed}
.head img{width:100%;height:100%;object-fit:cover;filter:brightness(0.6)}
.head.judul{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:rgba(0,0,0,0.4)}
.head h1{margin:0;font-size:32px;text-shadow:0 4px 12px #000}
.head p{margin:8px 0 0;font-size:14px;color:#d8b4fe;text-shadow:0 2px 6px #000}

.box{padding:15px}
.card{background:#1a1a2e;border:1px solid #2d2d44;border-radius:12px;padding:14px;margin-bottom:12px}
.card h3{margin:0 0 6px;color:#a78bfa;font-size:16px}
.card p{margin:6px 0;color:#cbd5e1;font-size:14px}
.btn{background:#25D366;color:#fff;border:none;padding:10px;border-radius:8px;width:100%;margin-top:8px;font-weight:bold}

.nav{position:fixed;bottom:0;left:0;width:100%;background:#0f0f1a;display:flex;border-top:2px solid #7c3aed;z-index:99}
.nav button{flex:1;background:none;border:none;color:#71717a;padding:12px 5px;font-size:11px}
.nav button.active{color:#a855f7;font-weight:bold;background:rgba(124,58,237,0.1)}
.nav-icon{font-size:20px;display:block;margin-bottom:3px}

.page{display:none}
.page.show{display:block}
#plus{position:fixed;right:15px;bottom:80px;width:55px;height:55px;border-radius:50%;background:#7c3aed;color:#fff;border:none;font-size:28px;z-index:98}
</style>
</head>
<body>

<div class="head">
<img src="https://wallpapers.com/images/hd/purple-anime-girl-4k-8kn8g2b2v3n1g2h3.jpg" alt="Anime Purple">
<div class="judul">
<h1>JhoReba</h1>
<p>Anime Marketplace</p>
</div>
</div>

<div class="box">
<div id="p1" class="page show">
<div class="card">
<h3>⛓️ Akun ML Mythic Glory</h3>
<p>Skin: 180+ | Rank: Mythic 600<br>Harga: Rp 350.000</p>
<button class="btn" onclick="wa('628123456789')">Chat WA</button>
</div>
<div class="card">
<h3>🪝 Akun FF Sultan</h3>
<p>Bundle Langka | Level 75<br>Harga: Rp 250.000</p>
<button class="btn" onclick="wa('628987654321')">Chat WA</button>
</div>
</div>

<div id="p2" class="page"><div class="card"><h3>🔍 Cari Akun</h3><p>Search nyusul bro</p></div></div>
<div id="p3" class="page"><div class="card"><h3>🛒 Cara Beli</h3><p>1.Pilih 2.Chat WA 3.Rekber</p></div></div>
<div id="p4" class="page"><div class="card"><h3>👤 Info</h3><p>Admin: 0812-3456-7890</p></div></div>
</div>

<button id="plus" onclick="alert('Posting coming soon')">+</button>

<div class="nav">
<button class="active" onclick="tab(1)"><span class="nav-icon">⛓️</span>Beranda</button>
<button onclick="tab(2)"><span class="nav-icon">🔍</span>Cari</button>
<button onclick="tab(3)"><span class="nav-icon">🪝</span>Beli</button>
<button onclick="tab(4)"><span class="nav-icon">👤</span>Info</button>
</div>

<script>
function tab(n){
var p = document.getElementsByClassName('page');
var b = document.querySelectorAll('.nav button');
for(var i=0;i<4;i++){
p[i].className = 'page';
b[i].className = '';
}
p[n-1].className = 'page show';
b[n-1].className = 'active';
}
function wa(no){window.open('https://wa.me/'+no)}
</script>

</body>
</html>
