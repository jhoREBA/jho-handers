<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LapakSkin + Form</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#0f172a;color:#e2e8f0}
nav{background:#1e293b;padding:15px;text-align:center;border-bottom:2px solid #334155;position:sticky;top:0}
nav h1{color:#38bdf8;margin-bottom:10px;font-size:24px}
nav button{background:#334155;color:#e2e8f0;border:none;padding:10px 20px;margin:0 4px;border-radius:8px;font-weight:bold;cursor:pointer;font-size:14px}
nav button.active{background:#38bdf8;color:#0f172a}
.container{max-width:900px;margin:30px auto;padding:20px}
.section{display:none}
.section.active{display:block;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
h2{color:#f1f5f9;margin-bottom:15px}
.box{background:#1e293b;padding:20px;border-radius:12px;border:1px solid #334155;margin-bottom:20px;color:#94a3b8}
form{background:#1e293b;padding:25px;border-radius:12px;border:1px solid #334155}
label{display:block;margin-top:15px;margin-bottom:5px;color:#38bdf8;font-weight:bold}
input,textarea{width:100%;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:15px}
textarea{min-height:100px;resize:vertical}
button.submit{background:#25D366;color:white;border:none;padding:14px;width:100%;border-radius:8px;font-weight:bold;font-size:16px;margin-top:20px;cursor:pointer}
button.submit:hover{background:#20b857}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-top:20px}
.card{background:#1e293b;border-radius:12px;overflow:hidden;border:1px solid #334155}
.card img{width:100%;height:190px;object-fit:cover}
.card-body{padding:15px}
.card-body h3{color:#38bdf8;margin-bottom:8px}
.price{color:#4ade80;font-weight:bold;font-size:22px;margin:10px 0}
.wa{background:#25D366;text-align:center;padding:12px;border-radius:8px;color:white;text-decoration:none;display:block;font-weight:bold;margin-top:10px}
small{color:#94a3b8;font-size:12px}
</style>
</head>
<body>

<nav>
  <h1>LapakSkin ML</h1>
  <button onclick="show('home')" class="active" id="btn-home">Home</button>
  <button onclick="show('jual')" id="btn-jual">Jual</button>
  <button onclick="show('katalog')" id="btn-katalog">Katalog</button>
  <button onclick="show('beli')" id="btn-beli">Beli Skin</button>
</nav>
