<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lapak Skin Game</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    nav { background: #1e293b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #334155; }
    nav h1 { color: #38bdf8; font-size: 24px; }
    nav ul { list-style: none; display: flex; gap: 25px; }
    nav ul li a { color: #e2e8f0; text-decoration: none; font-weight: 600; cursor: pointer; padding: 8px 12px; border-radius: 6px; transition: 0.2s; }
    nav ul li a:hover, nav ul li a.active { background: #334155; color: #38bdf8; }
    .container { max-width: 1100px; margin: 30px auto; padding: 20px; }
    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    .upload-box { background: #1e293b; padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #334155; }
    .upload-box h3 { color: #38bdf8; margin-bottom: 15px; }
    input, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 15px; }
    input:focus, textarea:focus { outline: none; border-color: #38bdf8; }
    button { background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; border: none; margin-top: 15px; }
    button:hover { background: #0ea5e9; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 20px; margin-top: 20px; }
    .card { background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; transition: 0.2s; }
    .card:hover { transform: translateY(-5px); border-color: #38bdf8; }
    .card img { width: 100%; height: 200px; object-fit: cover; background: #0f172a; }
    .card-body { padding: 15px; }
    .card-body h3 { color: #38bdf8; margin-bottom: 8px; font-size: 18px; }
    .card-body p { font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
    .price { color: #4ade80; font-weight: bold; font-size: 22px; margin: 10px 0; }
    .wa-btn { background: #25D366; text-align: center; padding: 12px; border-radius: 8px; color: white; text-decoration: none; display: block; font-weight: bold; margin-top: 10px; }
    .wa-btn:hover { background: #20b857; }
    h2 { margin-bottom: 15px; color: #f1f5f9; }
    .empty { text-align: center; padding: 50px; color: #64748b; }
    @media(max-width:768px){ nav{flex-direction:column;gap:10px} nav ul{gap:10px} .container{padding:15px} }
  </style>
</head>
<body>
  <!-- MENU NAVIGASI -->
  <nav>
    <h1>LapakSkin</h1>
    <ul>
      <li><a onclick="showSection('home')" class="active" id="nav-home">Home</a></li>
      <li><a onclick="showSection('jual')" id="nav-jual">Jual</a></li>
      <li><a onclick="showSection('beli')" id="nav-beli">Beli</a></li>
    </ul>
  </nav>

  <div class="container">
    <!-- MENU HOME -->
    <div id="home" class="section active">
      <h2>Selamat Datang di LapakSkin 🔥</h2>
      <p style="color:#94a3b8;line-height:1.6;margin-top:10px">Tempat jual beli skin game terpercaya. <br><br>Penjual: Post skin lu di menu "Jual" + isi no WA <br>Buyer: Cek skin di menu "Beli" > klik Chat WA ijo</p>
    </div>

    <!-- MENU JUAL - BUAT POST SKIN -->
    <div id="jual" class="section">
