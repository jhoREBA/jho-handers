
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jhoREBA MARKET - Jual Beli Akun Game</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
  body{background:#0a0f1a;color:#e8e8e8;padding-bottom:80px}

  header{background:linear-gradient(135deg,#ff4d00,#ff8c00);padding:16px;text-align:center;position:sticky;top:0;z-index:100}
  header h1{font-size:18px;font-weight:700}

 .container{padding:16px}

 .tab-btns{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto}
 .tab-btns button{flex-shrink:0;padding:10px 16px;background:#1a2332;border:1px solid #2d3748;border-radius:8px;color:#9ca3af;border:none;cursor:pointer}
 .tab-btns button.active{background:#ff4d00;color:white}

 .section{display:none}
 .section.active{display:block}

 .form-card,.item-card{background:#1a2332;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #2d3748}

  input,select,textarea{width:100%;padding:10px;background:#0f172a;border:1px solid #2d3748;border-radius:8px;color:white;margin-top:6px;margin-bottom:12px;font-size:14px}
  textarea{resize:vertical;min-height:60px}

  button.btn{background:#ff4d00;border:none;padding:12px;border-radius:8px;color:white;font-weight:700;width:100%;cursor:pointer}
  button.btn:hover{background:#ff6b00}

 .item-card{display:flex;gap:12px}
 .item-img{width:80px;height:80px;border-radius:8px;object-fit:cover;background:#0f172a}
 .item-info{flex:1}
 .item-title{font-weight:700;font-size:15px}
 .item-game{font-size:12px;color:#ff8c00;margin:4px 0}
 .item-price{font-size:18px;font-weight:700;color:#00d26a;margin:4px 0}
 .item-desc{font-size:13px;color:#9ca3af}
 .wa-btn{display:inline-block;margin-top:8px;padding:8px 16px;background:#25d366;color:white;text-decoration:none;border-radius:8px;font-size:13px;font-weight:700}

 .nav{position:fixed;bottom:0;left:0;right:0;background:#1a2332;display:flex;border-top:1px solid #2d3748}
 .nav button{flex:1;padding:12px;background:none;border:none;color:#9ca3af;font-size:12px}
 .nav button.active{color:#ff4d00}

 .empty{text-align:center;color:#9ca3af;padding:40px 0}
</style>
</head>
<body>

<header><h1>🎮 jhoREBA MARKET</h1></header>

<div class="container">
  <!-- Tab Jual -->
  <div id="jual" class="section active">
    <div class="form-card">
      <h3>Pasang Iklan Jual Akun</h3>
      <input type="text" id="sellerName" placeholder="Nama kamu">
      <select id="gameType">
        <option value="Mobile Legend">Mobile Legend</option>
        <option value="PUBG Mobile">PUBG Mobile</option>
        <option value="Free Fire">Free Fire</option>
        <option value="Genshin Impact">Genshin Impact</option>
        <option value="Lainnya">Lainnya</option>
      </select>
      <input type="text" id="itemTitle" placeholder="Judul iklan, contoh: Akun ML Mythic 100 Skin">
      <input type="number" id="itemPrice" placeholder="Harga Rp, contoh: 500000">
      <textarea id="itemDesc" placeholder="Deskripsi akun: rank, skin, login, dll"></textarea>
      <input type="text" id="itemWA" placeholder="No WA 62xxx, contoh: 628123456789">
      <input type="file" id="itemImg" accept="image/*">
      <button class="btn" onclick="addItem()">Pasang Iklan</button>
    </div>
  </div>

  <!-- Tab Beli -->
  <div id="beli" class="section">
    <div class="tab-btns">
      <button class="active" onclick="filterGame('All',this)">Semua</button>
      <button onclick="filterGame('Mobile Legend',this)">ML</button>
      <button onclick="filterGame('PUBG Mobile',this)">PUBG</button>
      <button onclick="filterGame('Free Fire',this)">FF</button>
    </div>
    <div id="itemList"></div>
  </div>

  <!-- Tab Info -->
  <div id="info" class="section">
    <div class="form-card">
      <h3>Peraturan</h3>
      <p>1. Transaksi diluar tanggung jawab admin. Gunakan MM kalau perlu.<br>
      2. Dilarang scam. Laporkan jika ada penipuan.<br>
      3. No WA yang dicantumkan harus aktif.</p>
      <p style="margin-top:12px;color:#9ca3af">Hubungi admin: 628xxxxx</p>
    </div>
  </div>
</div>

<div class="nav">
  <button class="active" onclick="showTab('jual',this)">Jual</button>
  <button onclick="showTab('beli',this)">Beli</button>
  <button onclick="showTab('info',this)">Info</button>
</div>

<script>
let items = JSON.parse(localStorage.getItem('gameMarket') || '[]');
let currentFilter = 'All';

function showTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if(id==='beli') renderItems();
}

function filterGame(game,btn){
  currentFilter = game;
  document.querySelectorAll('.tab-btns button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderItems();
}

function addItem(){
  const name = document.getElementById('sellerName').value;
  const game = document.getElementById('gameType').value;
  const title = document.getElementById('itemTitle').value;
  const price = document.getElementById('itemPrice').value;
  const desc = document.getElementById('itemDesc').value;
  const wa = document.getElementById('itemWA').value;
  const file = document.getElementById('itemImg').files[0];

  if(!title ||!price ||!wa){
    alert('Isi judul, harga, dan no WA dulu bro!');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e){
    const item = {
      id: Date.now(),
      name, game, title, price, desc, wa,
      img: e.target.result,
      date: new Date().toLocaleDateString('id-ID')
    };
    items.unshift(item);
    localStorage.setItem('gameMarket', JSON.stringify(items));
    alert('Iklan berhasil dipasang!');
    document.querySelectorAll('input,textarea').forEach(i=>i.value='');
    showTab('beli',document.querySelectorAll('.nav button')[1]);
  }

  if(file) reader.readAsDataURL(file);
  else {
    const item = {id: Date.now(), name, game, title, price, desc, wa, img:'', date:new Date().toLocaleDateString('id-ID')};
    items.unshift(item);
    localStorage.setItem('gameMarket', JSON.stringify(items));
    alert('Iklan berhasil dipasang!');
    document.querySelectorAll('input,textarea').forEach(i=>i.value='');
    showTab('beli',document.querySelectorAll('.nav button')[1]);
  }
}

function renderItems(){
  const list = document.getElementById('itemList');
  let filtered = currentFilter==='All'? items : items.filter(i=>i.game===currentFilter);

  if(filtered.length===0){
    list.innerHTML = '<div class="empty">Belum ada iklan untuk game ini</div>';
    return;
  }

  list.innerHTML = filtered.map(i=>`
    <div class="item-card">
      ${i.img? `<img src="${i.img}" class="item-img">` : '<div class="item-img"></div>'}
      <div class="item-info">
        <div class="item-title">${i.title}</div>
        <div class="item-game">${i.game} • ${i.name || 'Anon'}</div>
        <div class="item-price">Rp ${Number(i.price).toLocaleString('id-ID')}</div>
        <div class="item-desc">${i.desc}</div>
        <a href="https://wa.me/${i.wa}" target="_blank" class="wa-btn">💬 Chat WA</a>
      </div>
    </div>
  `).join('');
}

renderItems();
</script>

</body>
</html>
