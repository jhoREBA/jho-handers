<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JhoReba Franco Legend</title>
<style>
body{margin:0;font-family:sans-serif;background:#0a0a0f;padding-bottom:70px;color:#eee}
.header{position:relative;height:160px;overflow:hidden;padding:20px;color:white}
.header-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a0033,#330066,#6600cc);animation:geser 8s infinite;background-size:300% 300%}
@keyframes geser{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.header h1{position:relative;font-size:28px;margin:0;text-shadow:0 0 10px #a855f7}
.header p{position:relative;font-size:12px;opacity:0.8}
.content{padding:15px}
.page{display:none}
.page.active{display:block}
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:#111;display:flex;justify-content:space-around;padding:8px 0;border-top:1px solid #222;z-index:20}
.nav-btn{flex:1;text-align:center;border:none;background:none;color:#666;font-size:11px;padding:6px;cursor:pointer}
.nav-btn.active{color:#a855f7;font-weight:bold}
.nav-icon{font-size:22px;display:block}
.grid{display:grid;gap:10px}
.card{background:#1a1a2e;border-radius:12px;padding:12px;border:1px solid #222;position:relative}
.card img{width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px;background:#000}
.card.game{color:#a78bfa;font-size:12px;font-weight:bold;margin-bottom:4px}
.card h3{margin:5px 0;font-size:15px}
.card.desc{font-size:12px;color:#999;margin:5px 0}
.card.harga{font-size:18px;font-weight:bold;color:#4ade80;margin:5px 0}
.card button{width:48%;padding:8px;border:none;background:#25D366;color:white;border-radius:8px;margin-top:5px;cursor:pointer}
.btn-hapus{background:#ef4444!important;margin-left:4%}
#fab{position:fixed;bottom:80px;right:20px;width:50px;height:50px;border-radius:50%;background:#7c3aed;color:white;border:none;font-size:24px;z-index:15;cursor:pointer}
#popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:30}
#popup.show{display:flex}
.form{background:#1a1a2e;width:90%;max-width:400px;padding:20px;border-radius:15px;border:1px solid #333;max-height:90vh;overflow-y:auto}
.form h2{margin-top:0;color:#a78bfa}
.form input,.form select,.form textarea{width:100%;padding:10px;margin-bottom:8px;background:#0a0a0f;border:1px solid #333;color:#eee;border-radius:8px;box-sizing:border-box}
.form label{font-size:12px;color:#999;display:block;margin-bottom:4px}
.form button{width:100%;padding:10px;margin-top:5px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
#kirimBtn{background:#7c3aed;color:white}
#batalBtn{background:#333;color:#aaa}
.empty{text-align:center;color:#555;padding:50px 20px;font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div class="header-bg"></div>
  <h1>JhoReba</h1>
  <p>Franco Legend Marketplace</p>
</div>

<div class="content">
  <div id="beranda" class="page active">
    <div class="empty" id="kosong">⛓️<br>Belum ada akun dijual<br>Klik tombol + buat posting</div>
    <div class="grid" id="listAkun"></div>
  </div>

  <div id="cari" class="page">
    <input type="text" id="search" placeholder="Cari: ML, FF, Genshin..." style="width:100%;padding:10px;background:#1a1a2e;border:1px solid
