<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jhoREBA MARKET</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
  }
  header {
    background: #f97316;
    padding: 14px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }
  .filter {
    display: flex;
    gap: 8px;
    padding: 12px;
    overflow-x: auto;
    background: #0f172a;
  }
  .filter button {
    padding: 8px 18px;
    border: none;
    border-radius: 20px;
    background: #334155;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .filter button.active {
    background: #f97316;
  }
  .list {
    padding: 0 12px 20px;
  }
  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
    display: flex;
    gap: 12px;
  }
  .card img {
    width: 70px;
    height: 70px;
    border-radius: 8px;
    background: #334155;
    object-fit: cover;
  }
  .card-content {
    flex: 1;
  }
  .card h3 {
    font-size: 16px;
    margin-bottom: 4px;
  }
  .card .sub {
    font-size: 13px;
    color: #fb923c;
    margin-bottom: 6px;
  }
  .card .price {
    font-size: 18px;
    color: #22c55e;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .card .desc {
    font-size: 13px;
    color: #cbd5e1;
    margin-bottom: 10px;
  }
  .btn-wa {
    display: inline-block;
    padding: 8px 20px;
    background: #22c55e;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    font-weight: bold;
  }
</style>
</head>
