<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jhoREBA MARKET</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
    
    body { 
      background: #1a1a2e; 
      color: white; 
      padding-bottom: 70px;
    }
    
    header {
      background: linear-gradient(90deg, #ff6b00, #ff9500);
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      padding: 15px;
      overflow-x: auto;
    }
    
    .tab {
      padding: 8px 20px;
      background: #2e2e42;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
    }
    
    .tab.active {
      background: #ff6b00;
    }
    
    .content {
      display: none;
      padding: 0 15px;
    }
    
    .content.active {
      display: block;
    }
    
    .card {
      background: #2e2e42;
      margin: 10px 0;
      padding: 15px;
      border-radius: 12px;
      display: flex;
      gap: 15px;
    }
    
    .card-img {
      width: 70px;
      height: 70px;
      background: #444;
      border-radius: 8px;
    }
    
    .card-info {
      flex: 1;
    }
    
    .card-info h3 {
      font-size: 16px;
      margin-bottom: 5px;
    }
    
    .game {
      color: #ff9500;
      font-size: 14px;
    }
    
    .price {
      color: #00ff88;
      font-size: 18px;
      font-weight: bold;
      margin: 8px 0;
    }
    
    .desc {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 10px;
    }
    
    .btn-wa, .btn-submit, .btn-role {
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }
    
    .btn-wa {
      background: #25D366;
    }
    
    .btn-submit {
      background: #ff6b00;
      width: 100%;
      margin-top: 10px;
    }
    
    .btn-role {
      flex:1;
      padding:10px;
      background:#444;
      border-radius:8px;
    }
    
    .btn-role.active {
      background:#ff6b00;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px;
      background: #1a1a2e;
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
      font-size: 14px;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #ff6b00;
    }
    
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a2e;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      border-top: 1px solid #333;
    }
    
    .nav-item {
      color: #888;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
    }
    
    .nav-item.active {
      color: #ff6b00;
    }

      bottom: 80px;

      height: 55px;
