<!DOCTYPE html>
<html>
<head><title>TEST</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0f172a;color:white;text-align:center;padding:50px">
<h1>TEST SUPABASE</h1>
<div id="hasil">Loading...</div>

<script>
const SUPABASE_URL = 'https://czcfdankgachbulemfcx.supabase.co'
const SUPABASE_ANON_KEY = 'GANTI_DENGAN_ANON_KEY_KAMU' 
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

async function test(){
let { data, error } = await supabase.from('lapak_skin').select('*')
if(error){ document.getElementById('hasil').innerText = 'ERROR: ' + error.message }
else{ document.getElementById('hasil').innerText = 'BERHASIL! Data ada: ' + data.length }
}
test()
</script>
</body>
</html>
