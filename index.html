<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jual Beli Akun</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;padding:20px;max-width:500px;margin:auto}
input,textarea,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:16px}
button{background:#3b82f6;border:none;font-weight:bold;cursor:pointer}
button:active{transform:scale(0.98)}
.item{background:#1e293b;padding:15px;border-radius:10px;margin:12px 0;border-left:4px solid #3b82f6}
.item b{font-size:18px}
small{color:#94a3b8}
</style>
</head>
<body>
<h2>📱 Jual Beli Akun Game</h2>

<input id="game" placeholder="Nama Game - ML, FF, PUBG">
<input id="harga" placeholder="Harga - contoh: 150rb">
<textarea id="kontak" placeholder="Kontak WA: 08xxxx"></textarea>
<button id="btnKirim">POST JUALAN</button>

<h3>📋 Daftar Jualan</h3>
<div id="list">Loading...</div>

<!-- KODE FIREBASE VERSI LAMA - PASTI JALAN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
// INI KUNCI FIREBASE LU - UDAH GUE PASTEIN
const firebaseConfig = {
  apiKey: "AIzaSyBEryRDPA0ePlc9XWPDDSFUDBJD1HFyEaU",
  authDomain: "jhorebamarket.firebaseapp.com",
  databaseURL: "https://jhorebamarket-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "jhorebamarket",
  storageBucket: "jhorebamarket.firebasestorage.app",
  messagingSenderId: "835799277509",
  appId: "1:835799277509:web:ae0d45242aa34c8cec75ac"
};

// INISIALISASI FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// FUNGSI KIRIM DATA
document.getElementById('btnKirim').onclick = function(){
  const game = document.getElementById('game').value;
  const harga = document.getElementById('harga').value;
  const kontak = document.getElementById('kontak').value;
  
  if(game == '' || harga == '' || kontak == ''){
    alert('Isi semua bro!');
    return;
  }
  
  db.ref('items').push({
    game: game,
    harga: harga,
    kontak: kontak,
    waktu: new Date().toLocaleString('id-ID')
  });
  
  alert('Berhasil dikirim!');
  document.getElementById('game').value = '';
  document.getElementById('harga').value = '';
  document.getElementById('kontak').value = '';
}

// TAMPILIN DATA OTOMATIS
db.ref('items').on('value', snap => {
  let html = '';
  snap.forEach(child => {
    const d = child.val();
    html += `<div class="item"><b>${d.game}</b><br>Rp ${d.harga}<br>Kontak: ${d.kontak}<br><small>${d.waktu}</small></div>`;
  });
  document.getElementById('list').innerHTML = html || 'Belum ada jualan';
});
</script>
</body>
</html>
